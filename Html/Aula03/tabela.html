<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de tabela</title>
</head>
<body>
    <table border="1" cellpadding="0" cellspacing="0">
        <thead>
            <th>Id</th>
            <th>Nome</th>
            <th>Idade</th>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">1</td>
                <td>João</td>
                <td>25</td>
            </tr>
            <tr>

                <td>Maria</td>
                <td>30</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Pedro</td>
                <td>28</td>
            </tr>
            <tr>
                <td colspan="2">Total:</td>
                <td>83</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
