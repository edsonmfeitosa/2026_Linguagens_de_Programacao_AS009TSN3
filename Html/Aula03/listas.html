<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas HTML</title>
</head>
<body>
    <p>Lista não ordenada</p>
    <ul>
        <li>Maça/li>
        <li>Pera</li>
        <li>Banana</li>
    </ul>
    <p>Lista ordenada</p>
    <ol>
        <li>1ª série</li>
        <li>2ª série</li>
        <li>3ª série</li>
    </ol>
    <p>Lista de definição</p>
    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>
        <dt>JavaScript</dt>
        <dd>Linguagem de programação para web</dd>
</body>
</html>
