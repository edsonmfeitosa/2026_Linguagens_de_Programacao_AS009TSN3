<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout interno e externo</title>
</head>
<style>
    .externa {
        background-color: grey;
        padding: 30px;
        margin: 30px;
        border: 2px solid black;
    }
    .interna {
        background-color: blue;
        padding: 30px;
        margin: 30px;
        border: 2px solid black;
    }
</style>
<body>
    <div class="externa">
        <div class="interna">
            <p>Layout interno e externo</p>
        </div>
    </div>
</body>
</html>
