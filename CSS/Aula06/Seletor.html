<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formas de definir onde aplicar CSS - Seletor</title>
  </head>
  <Style>
    /* Aplicar por classe: */
    .seletor1 {
      background-color: red;
      color: white;
      font-weight: bold;
    }
    /* Aplicar por id: */
    #seletor2 {
      background-color: blue;
      color: white;
      font-weight: bold;
    }
    /* Aplicar por tag: */
    div {
      background-color: green;
      color: white;
      font-weight: bold;
    }
  </Style>
  <body>
    <div class="seletor1">Aplicar por classe</div>
    <div id="seletor2">Aplicar por id</div>
    <div>Aplicar por tag</div>
  </body>
</html>
