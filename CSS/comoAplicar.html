<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Como Aplicar CSS</title>
    <style>
        /* CSS Interno */
        div {
            font-family: Arial, sans-serif;
            background-color: grey;
            color: #e6dede;
        }
    </style>
    <link rel="stylesheet" href="comoAplicar.css">
</head>
<body>
    <div style="background-color: blue;">
        Existem três formas de aplicar CSS a 
        um documento HTML: inline, interno e externo. 

    </div>
</body>
</html>
