<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Float</title>
</head>
<style>
    div {
        background-color: grey;
        width: 100px;
        height: 100px;
        border: 1px solid black;
        margin: 5px;
        float: right;
    }
    .flutuar {
        float: left;
        background-color: red;
        width: 80px;
        height: 80px;
    }
    p {
        clear: left;
    }
</style>
<body>
    <div class="flutuar">Conteudo01</div>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Sed harum ad veniam velit nisi quam asperiores accusamus adipisci dolore, quaerat maxime nulla nesciunt distinctio dolor libero iure tempore doloremque minima.</p>
    <div>Conteudo02</div>
    <div>Conteudo03</div>

</body>
</html>
